services:
  - type: web
    name: conversion-engine-webhook
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn webhook.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.0
      - key: RESEND_WEBHOOK_SECRET
        sync: false
      - key: CALCOM_WEBHOOK_SECRET
        sync: false
      - key: HUBSPOT_CLIENT_SECRET
        sync: false
      - key: AT_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false
      - key: LANGFUSE_BASE_URL
        value: https://us.cloud.langfuse.com
